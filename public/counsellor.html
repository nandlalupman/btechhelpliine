<!doctype html>
<html lang="en">
  <head>
    <!-- Google Search Console -->
    <meta name="google-site-verification" content="YOUR_GOOGLE_SEARCH_CONSOLE_KEY" />

    <!-- Google Analytics (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=YOUR_GOOGLE_ANALYTICS_ID"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'YOUR_GOOGLE_ANALYTICS_ID');
    </script>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Counsellor Portal | BtechHelpline</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="styles.css" />
    <style>
      body.counsellor-body {
        background: #0f172a;
        color: #f8fafc;
        font-family: 'Inter', system-ui, sans-serif;
        min-height: 100vh;
      }

      .portal-container {
        width: 100%;
        max-width: 100%;
        padding: 30px 40px;
        box-sizing: border-box;
      }

      header.dash-header {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        transition: background 0.3s, box-shadow 0.3s;
      }

      .dash-header-container {
        width: 100%;
        max-width: 100%;
        padding: 16px 40px;
        box-sizing: border-box;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .dash-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 1.3rem;
        font-weight: 900;
        color: #3b82f6;
      }

      /* Back to top button */
      #back-to-top.visible {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
      }
      #back-to-top:hover {
        transform: translateY(-3px) scale(1.05);
        box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
      }

      .dash-brand span span {
        color: #f59e0b;
      }

      .btn-logout {
        padding: 10px 18px;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.2);
        color: #f87171;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.9rem;
        transition: all 0.3s;
      }

      .btn-logout:hover {
        background: rgba(239, 68, 68, 0.2);
        color: #ef4444;
      }

      /* Stats widget row */
      .stats-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        margin-bottom: 45px;
      }

      .stat-card {
        background: rgba(30, 41, 59, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 16px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .stat-card h3 {
        color: #94a3b8;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin: 0 0 10px 0;
      }

      .stat-card .value {
        font-size: 2rem;
        font-weight: 800;
        color: #ffffff;
        margin: 0;
      }

      /* Lead listing layout */
      .leads-section {
        background: rgba(30, 41, 59, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        padding: 30px;
      }

      .leads-section h2 {
        font-size: 1.3rem;
        font-weight: 700;
        margin-bottom: 25px;
        border-left: 4px solid #3b82f6;
        padding-left: 12px;
      }

      .leads-list {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .lead-card {
        background: rgba(15, 23, 42, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 16px;
        overflow: hidden;
      }

      .lead-summary {
        padding: 20px;
        cursor: pointer;
        display: grid;
        grid-template-columns: 2fr 1fr 1fr 1fr;
        gap: 15px;
        align-items: center;
        transition: background 0.3s;
      }

      .lead-summary:hover {
        background: rgba(255, 255, 255, 0.02);
      }

      .lead-name h3 {
        font-size: 1.1rem;
        font-weight: 700;
        margin: 0 0 4px 0;
        color: #ffffff;
      }

      .lead-name span {
        font-size: 0.85rem;
        color: #94a3b8;
      }

      .badge {
        font-size: 0.75rem;
        font-weight: 700;
        padding: 4px 8px;
        border-radius: 6px;
        display: inline-block;
        text-transform: uppercase;
      }

      .badge-branch {
        background: rgba(59, 130, 246, 0.15);
        color: #93c5fd;
      }

      .badge-status {
        text-transform: uppercase;
        font-size: 0.75rem;
        padding: 4px 8px;
        border-radius: 6px;
      }

      .status-new { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
      .status-contacted { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
      .status-in_progress { background: rgba(139, 92, 246, 0.15); color: #a78bfa; }
      .status-counselled { background: rgba(16, 185, 129, 0.15); color: #34d399; }
      .status-closed { background: rgba(100, 116, 139, 0.15); color: #cbd5e1; }
      .status-dropped { background: rgba(239, 68, 68, 0.15); color: #f87171; }
      .status-cancelled { background: rgba(148, 163, 184, 0.15); color: #94a3b8; }

      /* Expanded Details section */
      .lead-details-pane {
        padding: 24px;
        background: rgba(15, 23, 42, 0.8);
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        display: none; /* toggled via JS */
        grid-template-columns: 1fr 1fr;
        gap: 30px;
      }

      .lead-details-pane.active {
        display: grid;
      }

      .details-list {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        font-size: 0.9rem;
      }

      .details-list div {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .details-list div span {
        color: #64748b;
        font-size: 0.8rem;
        text-transform: uppercase;
      }

      .details-list div strong {
        color: #cbd5e1;
      }

      /* Status controls & Notes */
      .action-pane {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .status-update {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .status-update select {
        padding: 8px 12px;
        background: #1e293b;
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        border-radius: 8px;
        outline: none;
      }

      .status-update button {
        padding: 8px 16px;
        background: #2563eb;
        border: none;
        color: white;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
      }

      /* Notes interface */
      .notes-box {
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        padding-top: 20px;
      }

      .notes-box h4 {
        margin: 0 0 12px 0;
        font-size: 0.95rem;
        color: #60a5fa;
      }

      .notes-timeline {
        max-height: 200px;
        overflow-y: auto;
        padding-right: 8px;
        margin-bottom: 15px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .note-item {
        background: rgba(30, 41, 59, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.03);
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 0.88rem;
      }

      .note-header {
        display: flex;
        justify-content: space-between;
        font-size: 0.75rem;
        color: #64748b;
        margin-bottom: 6px;
      }

      .note-content {
        color: #e2e8f0;
      }

      .note-input {
        display: flex;
        gap: 10px;
      }

      .note-input textarea {
        flex-grow: 1;
        background: #1e293b;
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        padding: 10px;
        border-radius: 8px;
        height: 60px;
        resize: none;
        outline: none;
        font-size: 0.88rem;
      }

      .note-input button {
        padding: 0 16px;
        background: #10b981;
        border: none;
        color: white;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
      }

      .no-leads {
        text-align: center;
        padding: 50px 20px;
        color: #64748b;
      }

      /* Premium Toast Notification */
      .toast {
        position: fixed;
        bottom: 24px; right: 24px;
        background: rgba(30, 41, 59, 0.95);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 14px 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        z-index: 2000;
        display: flex;
        align-items: center;
        gap: 12px;
        transform: translateY(30px);
        opacity: 0;
        visibility: hidden;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        font-family: inherit;
        font-size: 0.9rem;
        font-weight: 600;
        max-width: 380px;
      }
      .toast.show {
        transform: translateY(0);
        opacity: 1;
        visibility: visible;
      }
      .toast-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        font-size: 1rem;
        flex-shrink: 0;
      }
      .toast-success {
        border-left: 4px solid #10b981;
      }
      .toast-success .toast-icon {
        background: rgba(16, 185, 129, 0.15);
        color: #34d399;
      }
      .toast-error {
        border-left: 4px solid #f43f5e;
      }
      .toast-error .toast-icon {
        background: rgba(244, 63, 94, 0.15);
        color: #f87171;
      }
      .toast-warning {
        border-left: 4px solid #fbbf24;
      }
      .toast-warning .toast-icon {
        background: rgba(251, 191, 36, 0.15);
        color: #fbbf24;
      }
      .toast-info {
        border-left: 4px solid #3b82f6;
      }
      .toast-info .toast-icon {
        background: rgba(59, 130, 246, 0.15);
        color: #60a5fa;
      }
      .toast-content {
        color: #f1f5f9;
        line-height: 1.4;
      }

      @media (max-width: 900px) {
        .lead-summary {
          grid-template-columns: 1fr 1fr;
          gap: 10px;
        }
        .lead-details-pane {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 768px) {
        .dash-header-container {
          flex-direction: column;
          gap: 12px;
          text-align: center;
          padding: 12px 16px;
        }
        .dash-header-container > div {
          justify-content: center;
          flex-wrap: wrap;
        }
        .portal-container {
          padding: 20px 16px;
        }
        .stats-row {
          grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)) !important;
          gap: 12px;
          margin-bottom: 24px;
        }
        .stat-card {
          padding: 14px;
        }
        .stat-card .value {
          font-size: 1.6rem;
        }
        .leads-section {
          padding: 20px;
        }
      }
    </style>
  </head>
  <body class="counsellor-body">
    <!-- Header -->
    <header class="dash-header">
      <div class="dash-header-container">
        <div class="dash-brand">
          <img src="assets/logos/logo.png" alt="BtechHelpline Logo" style="height: 40px; width: 140px; object-fit: fill; display: block;" />
        </div>
        <div style="display: flex; align-items: center; gap: 15px;">
          <span id="counsellor-name" style="font-weight: 600; color: #a78bfa;">Counsellor Portal</span>
          <button class="btn-logout" id="btn-logout">Logout</button>
        </div>
      </div>
      <!-- Scroll Progress Bar -->
      <div id="scroll-progress" style="position: absolute; bottom: 0; left: 0; height: 3px; background: linear-gradient(90deg, #3b82f6, #f59e0b); width: 0%; transition: width 0.1s ease-out; z-index: 101;"></div>
    </header>

    <div class="portal-container" style="padding-top: 24px;">

      <!-- Stats row -->
      <section class="stats-row">
        <div class="stat-card">
          <div>
            <h3>Total Assigned</h3>
            <p class="value" id="stat-total">0</p>
          </div>
        </div>
        <div class="stat-card">
          <div>
            <h3>Active Leads</h3>
            <p class="value" id="stat-active" style="color: #60a5fa;">0</p>
          </div>
        </div>
        <div class="stat-card">
          <div>
            <h3>Counselled Completed</h3>
            <p class="value" id="stat-completed" style="color: #10b981;">0</p>
          </div>
        </div>
        <div class="stat-card">
          <div>
            <h3>Success Rate</h3>
            <p class="value" id="stat-rate">0%</p>
          </div>
        </div>
      </section>

      <!-- Assigned Leads -->
      <main class="leads-section">
        <h2>My Assigned Student Leads</h2>
        <div class="leads-list" id="leads-list">
          <div class="no-leads">Loading lead lists...</div>
        </div>
      </main>

    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="config.js"></script>
    <script>
      const token = localStorage.getItem('token');
      const role = localStorage.getItem('role');

      if (!token || !['counsellor', 'admin'].includes(role)) {
        localStorage.clear();
        window.location.href = 'login.html';
      }

      document.getElementById('counsellor-name').textContent = localStorage.getItem('userName') || 'Counsellor Portal';

      function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        if (!toast) return;
        
        // Clear previous classes
        toast.className = 'toast';
        toast.classList.add(`toast-${type}`);
        
        // Define icons
        let iconHtml = 'ℹ️';
        if (type === 'success') iconHtml = '✔️';
        else if (type === 'error') iconHtml = '❌';
        else if (type === 'warning') iconHtml = '⚠️';
        
        toast.innerHTML = `
          <div class="toast-icon">${iconHtml}</div>
          <div class="toast-content">${message}</div>
        `;
        
        // Trigger show
        toast.classList.add('show');
        
        // Hide after 3.5 seconds
        if (window.toastTimeout) clearTimeout(window.toastTimeout);
        window.toastTimeout = setTimeout(() => {
          toast.classList.remove('show');
        }, 3500);
      }

      async function fetchStats() {
        try {
          const res = await fetch(`${API_URL}/api/counsellor/stats`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          const data = await res.json();
          if (res.ok && data.success) {
            document.getElementById('stat-total').textContent = data.data.totalLeads;
            document.getElementById('stat-active').textContent = data.data.openLeads;
            document.getElementById('stat-completed').textContent = data.data.completedLeads;
            document.getElementById('stat-rate').textContent = data.data.performanceRate;
          }
        } catch (err) {
          console.error(err);
        }
      }

      async function fetchLeads() {
        try {
          const res = await fetch(`${API_URL}/api/counsellor/leads`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          const data = await res.json();
          const container = document.getElementById('leads-list');
          container.innerHTML = '';

          if (res.ok && data.success) {
            const leads = data.data;
            if (leads.length === 0) {
              container.innerHTML = `<div class="no-leads">No leads assigned to you yet.</div>`;
              return;
            }

            leads.forEach(lead => {
              const card = document.createElement('div');
              card.className = 'lead-card';
              
              const dateStr = new Date(lead.createdAt).toLocaleDateString('en-IN', {
                day: 'numeric', month: 'short'
              });

              card.innerHTML = `
                <div class="lead-summary" onclick="toggleDetails('${lead._id}')">
                  <div class="lead-name">
                    <h3>${escapeHTML(lead.name)}</h3>
                    <span>${escapeHTML(lead.phone)} | ${escapeHTML(lead.email)}</span>
                  </div>
                  <div><span class="badge badge-branch">${escapeHTML(lead.preferredBranch)}</span></div>
                  <div><span class="badge" style="background:rgba(255,255,255,0.05);color:#cbd5e1">${escapeHTML(lead.preferredState)}</span></div>
                  <div><span class="badge badge-status status-${lead.status}">${lead.status.replace('_', ' ')}</span></div>
                </div>

                <div class="lead-details-pane" id="details-${lead._id}">
                  <div class="details-list">
                    <div>
                      <span>JEE Rank</span>
                      <strong>${escapeHTML(lead.jeeRank) || 'Not Provided'}</strong>
                    </div>
                    <div>
                      <span>Category</span>
                      <strong>${escapeHTML(lead.category)}</strong>
                    </div>
                    <div>
                      <span>Budget Limit</span>
                      <strong>${escapeHTML(lead.budget)}</strong>
                    </div>
                    <div>
                      <span>Date Submitted</span>
                      <strong>${new Date(lead.createdAt).toLocaleString('en-IN')}</strong>
                    </div>
                    <div style="grid-column: span 2;">
                      <span>Student Message</span>
                      <p style="margin: 4px 0 0 0; color:#e2e8f0; font-size: 0.9rem;">${escapeHTML(lead.message) || 'No message provided'}</p>
                    </div>
                  </div>

                  <div class="action-pane">
                    <div class="status-update">
                      <label style="font-size:0.8rem;color:#94a3b8;font-weight:600;">Status:</label>
                      <select id="status-select-${lead._id}">
                        <option value="new" ${lead.status === 'new' ? 'selected' : ''}>New</option>
                        <option value="contacted" ${lead.status === 'contacted' ? 'selected' : ''}>Contacted</option>
                        <option value="in_progress" ${lead.status === 'in_progress' ? 'selected' : ''}>In Progress</option>
                        <option value="counselled" ${lead.status === 'counselled' ? 'selected' : ''}>Counselled/Completed</option>
                        <option value="closed" ${lead.status === 'closed' ? 'selected' : ''}>Closed</option>
                        <option value="dropped" ${lead.status === 'dropped' ? 'selected' : ''}>Dropped</option>
                        <option value="cancelled" ${lead.status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
                      </select>
                      <button onclick="updateStatus('${lead._id}')">Save Status</button>
                    </div>

                    <div class="notes-box">
                      <h4>Counsellor Interaction Notes</h4>
                      <div class="notes-timeline" id="notes-timeline-${lead._id}">
                        ${renderNotes(lead.notes)}
                      </div>
                      <div class="note-input">
                        <textarea id="note-text-${lead._id}" placeholder="Type consultation note here..."></textarea>
                        <button onclick="addNote('${lead._id}')">Add Note</button>
                      </div>
                    </div>
                  </div>
                </div>
              `;
              container.appendChild(card);
            });
          }
        } catch (err) {
          console.error(err);
        }
      }

      function toggleDetails(id) {
        const details = document.getElementById(`details-${id}`);
        details.classList.toggle('active');
      }

      function renderNotes(notes) {
        if (!notes || notes.length === 0) {
          return '<p style="color:#64748b;font-size:0.85rem;margin:0;">No notes added yet.</p>';
        }

        return notes.map(note => `
          <div class="note-item">
            <div class="note-header">
              <strong>${escapeHTML(note.addedBy?.name || 'Counsellor')}</strong>
              <span>${new Date(note.addedAt).toLocaleString('en-IN', { hour: '2-digit', minute:'2-digit', day: '2-digit', month: 'short' })}</span>
            </div>
            <div class="note-content">${escapeHTML(note.text)}</div>
          </div>
        `).join('');
      }

      async function updateStatus(id) {
        const select = document.getElementById(`status-select-${id}`);
        const status = select.value;

        try {
          const res = await fetch(`${API_URL}/api/counsellor/leads/${id}/status`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ status })
          });
          const data = await res.json();
          if (res.ok && data.success) {
            showToast('Status updated successfully');
            fetchStats();
            fetchLeads();
          } else {
            showToast(data.error || 'Failed to update status', 'error');
          }
        } catch (err) {
          showToast('Server connection error', 'error');
        }
      }

      async function addNote(id) {
        const textarea = document.getElementById(`note-text-${id}`);
        const text = textarea.value.trim();
        if (!text) return;

        try {
          const res = await fetch(`${API_URL}/api/counsellor/leads/${id}/notes`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ text })
          });
          const data = await res.json();
          if (res.ok && data.success) {
            showToast('Note added successfully');
            textarea.value = '';
            // Re-render notes
            const timeline = document.getElementById(`notes-timeline-${id}`);
            timeline.innerHTML = renderNotes(data.data);
          } else {
            showToast(data.error || 'Failed to add note', 'error');
          }
        } catch (err) {
          showToast('Server connection error', 'error');
        }
      }

      function escapeHTML(str) {
        if (!str) return '';
        return str
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function handleLogout() {
        localStorage.clear();
        window.location.href = 'login.html';
      }
      document.getElementById('btn-logout').addEventListener('click', handleLogout);

      // Init
      fetchStats();
      fetchLeads();

      // Scroll handling for sticky header progress and back-to-top
      window.addEventListener('scroll', () => {
        const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
        const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        const scrolled = height > 0 ? (winScroll / height) * 100 : 0;
        const scrollBar = document.getElementById('scroll-progress');
        if (scrollBar) scrollBar.style.width = scrolled + '%';
        
        const backToTop = document.getElementById('back-to-top');
        if (backToTop) {
          if (winScroll > 300) {
            backToTop.classList.add('visible');
          } else {
            backToTop.classList.remove('visible');
          }
        }
      });

      const backToTopBtn = document.getElementById('back-to-top');
      if (backToTopBtn) {
        backToTopBtn.addEventListener('click', () => {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      }
    </script>
    <!-- Back to Top Button -->
    <button id="back-to-top" title="Go to top" style="position: fixed; bottom: 30px; right: 30px; z-index: 99; border: none; outline: none; background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: white; cursor: pointer; width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4); opacity: 0; visibility: hidden; transition: all 0.3s ease; transform: translateY(10px);">
      <svg viewBox="0 0 24 24" style="width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round;">
        <polyline points="18 15 12 9 6 15"></polyline>
      </svg>
    </button>
  </body>
</html>
