<!doctype html>
<html lang="en">
  <head>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset Password | BtechHelpline</title>
    <meta name="robots" content="noindex, nofollow" />

    <!-- Preconnect Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <style>
      :root {
        --blue: #2563eb;
        --blue-dark: #1e40af;
        --blue-deeper: #1e3a8a;
        --violet: #7c3aed;
        --emerald: #10b981;
        --ink: #0f172a;
        --white: #ffffff;
        --slate-100: #f1f5f9;
        --slate-300: #cbd5e1;
        --slate-400: #94a3b8;
        --slate-800: #1e293b;
        --radius-card: 24px;
        --radius-input: 12px;
        --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      * {
        box-sizing: border-box;
      }

      body.auth-body {
        margin: 0;
        padding: 0;
        background: #070a13;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        color: var(--slate-100);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        overflow-x: hidden;
        padding: 24px 16px;
      }

      /* ── Aurora Backdrop Blobs ── */
      .aurora-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        overflow: hidden;
        pointer-events: none;
      }

      .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(140px);
        opacity: 0.35;
        mix-blend-mode: screen;
        animation: floatBlob 25s infinite ease-in-out alternate;
      }

      .blob-1 {
        top: -10%;
        left: -10%;
        width: 50vw;
        height: 50vw;
        background: radial-gradient(circle, rgba(37, 99, 235, 0.4) 0%, transparent 70%);
        animation-duration: 22s;
      }

      .blob-2 {
        bottom: -10%;
        right: -10%;
        width: 55vw;
        height: 55vw;
        background: radial-gradient(circle, rgba(124, 58, 237, 0.35) 0%, transparent 70%);
        animation-duration: 28s;
        animation-delay: -5s;
      }

      .blob-3 {
        top: 35%;
        left: 40%;
        width: 45vw;
        height: 45vw;
        background: radial-gradient(circle, rgba(16, 185, 129, 0.18) 0%, transparent 70%);
        animation-duration: 33s;
        animation-delay: -10s;
      }

      @keyframes floatBlob {
        0% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(8%, 6%) scale(1.08);
        }
        100% {
          transform: translate(-6%, -8%) scale(0.92);
        }
      }

      /* ── Glassmorphic Card ── */
      .auth-card-full {
        position: relative;
        z-index: 2;
        width: 100%;
        max-width: 450px;
        background: rgba(15, 22, 42, 0.45);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: var(--radius-card);
        padding: 40px 36px;
        box-shadow: 
          0 4px 30px rgba(0, 0, 0, 0.2),
          0 24px 60px rgba(0, 0, 0, 0.4),
          inset 0 1px 1px rgba(255, 255, 255, 0.08);
        animation: cardEntrance 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      @keyframes cardEntrance {
        from {
          opacity: 0;
          transform: translateY(24px) scale(0.97);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      /* ── Logo Header inside Card ── */
      .auth-header {
        text-align: center;
        margin-bottom: 32px;
      }

      .auth-logo {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        font-size: 1.5rem;
        font-weight: 900;
        color: var(--blue);
        margin-bottom: 16px;
        transition: transform var(--transition);
      }

      .auth-logo:hover {
        transform: scale(1.02);
      }

      .auth-logo span span {
        color: #f59e0b;
      }

      .brand-mark {
        width: 38px;
        height: 38px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, var(--blue), var(--violet));
        border-radius: 10px;
        color: var(--white);
        box-shadow: 0 8px 20px rgba(37, 99, 235, 0.25);
      }

      .brand-mark svg {
        width: 22px;
        fill: currentColor;
      }

      .auth-card-full h1 {
        font-size: 1.8rem;
        font-weight: 800;
        color: var(--white);
        margin: 0 0 8px 0;
        letter-spacing: -0.02em;
      }

      .auth-card-full p.subtitle {
        color: var(--slate-400);
        font-size: 0.92rem;
        margin: 0;
        line-height: 1.5;
      }

      /* ── Form Controls ── */
      .auth-form label {
        display: flex;
        flex-direction: column;
        gap: 8px;
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--slate-300);
        margin-bottom: 18px;
        text-align: left;
      }

      .auth-form input {
        width: 100%;
        padding: 14px 18px;
        background: rgba(10, 15, 30, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: var(--radius-input);
        color: var(--white);
        outline: none;
        font-size: 0.95rem;
        transition: all var(--transition);
      }

      .auth-form input:focus {
        border-color: var(--blue);
        background: rgba(10, 15, 30, 0.7);
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
      }

      .auth-form input::placeholder {
        color: rgba(255, 255, 255, 0.3);
      }

      /* Buttons */
      .auth-form button[type="submit"] {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, var(--blue), var(--violet));
        border: none;
        border-radius: var(--radius-input);
        color: white;
        font-weight: 700;
        cursor: pointer;
        font-size: 1rem;
        transition: all var(--transition);
        box-shadow: 0 4px 20px rgba(124, 58, 237, 0.25);
        margin-top: 10px;
      }

      .auth-form button[type="submit"]:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 24px rgba(124, 58, 237, 0.35);
      }

      .auth-form button[type="submit"]:active {
        transform: translateY(0);
      }

      .auth-form button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none !important;
        box-shadow: none !important;
      }

      /* Footers */
      .auth-footer {
        margin-top: 28px;
        text-align: center;
        font-size: 0.92rem;
        color: var(--slate-400);
      }

      .auth-footer a {
        color: var(--blue);
        font-weight: 600;
        transition: color var(--transition);
      }

      .auth-footer a:hover {
        text-decoration: underline;
        color: var(--violet);
      }

      .field-error {
        color: #f87171;
        font-size: 0.78rem;
        font-weight: 500;
        margin-top: 5px;
        min-height: 16px;
        text-align: left;
      }

      /* Messages */
      .form-msg {
        text-align: center;
        padding: 12px;
        border-radius: 10px;
        font-size: 0.88rem;
        font-weight: 550;
        margin-bottom: 24px;
        display: none;
        line-height: 1.4;
      }

      .form-msg.error {
        display: block;
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #f87171;
      }

      /* Premium Toast Notification */
      .toast {
        position: fixed;
        bottom: 24px; right: 24px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        padding: 14px 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        z-index: 2000;
        display: flex;
        align-items: center;
        gap: 12px;
        transform: translateY(30px);
        opacity: 0;
        visibility: hidden;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        font-family: inherit;
        font-size: 0.9rem;
        font-weight: 600;
        max-width: 380px;
      }
      .toast.show {
        transform: translateY(0);
        opacity: 1;
        visibility: visible;
      }
      .toast-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        font-size: 0.9rem;
        flex-shrink: 0;
      }
      .toast-success {
        border-left: 4px solid #10b981;
      }
      .toast-success .toast-icon {
        background: rgba(16, 185, 129, 0.15);
        color: #34d399;
      }
      .toast-error {
        border-left: 4px solid #f43f5e;
      }
      .toast-error .toast-icon {
        background: rgba(244, 63, 94, 0.15);
        color: #f43f5e;
      }
      .toast-warning {
        border-left: 4px solid #fbbf24;
      }
      .toast-warning .toast-icon {
        background: rgba(251, 191, 36, 0.15);
        color: #fbbf24;
      }
      .toast-info {
        border-left: 4px solid #3b82f6;
      }
      .toast-info .toast-icon {
        background: rgba(59, 130, 246, 0.15);
        color: #60a5fa;
      }
      .toast-content {
        color: #cbd5e1;
        line-height: 1.4;
      }
    </style>
  </head>
  <body class="auth-body">
    <!-- Animated background -->
    <div class="aurora-bg">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
    </div>

    <!-- Centered Card -->
    <main class="auth-card-full">
      <div class="auth-header">
        <div class="auth-logo">
          <img src="assets/logos/logo.png" alt="BtechHelpline Logo" style="height: 38px; width: auto; display: block; margin: 0 auto;" />
        </div>
        <h1>Choose New Password</h1>
        <p class="subtitle">Please enter your new strong password below</p>
      </div>

      <div class="form-msg" id="form-msg"></div>

      <form class="auth-form" id="reset-form" novalidate>
        <label>
          New Password
          <input type="password" id="password" placeholder="Min 8 chars, 1 uppercase, 1 number" required autofocus />
          <small class="field-error" id="error-password"></small>
        </label>

        <label>
          Confirm Password
          <input type="password" id="confirm-password" placeholder="Confirm your new password" required />
          <small class="field-error" id="error-confirm-password"></small>
        </label>

        <button type="submit" id="btn-submit">Reset Password</button>
      </form>
    </main>

    <script src="config.js"></script>
    <script>
      const form = document.getElementById('reset-form');
      const submitBtn = document.getElementById('btn-submit');
      const formMsg = document.getElementById('form-msg');

      // Helper to show toasts
      function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        if (!toast) return;
        
        toast.className = 'toast';
        toast.classList.add(`toast-${type}`);
        
        let iconHtml = `
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="16" x2="12" y2="12"></line>
            <line x1="12" y1="8" x2="12.01" y2="8"></line>
          </svg>
        `;
        if (type === 'success') {
          iconHtml = `
            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          `;
        } else if (type === 'error') {
          iconHtml = `
            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="15" y1="9" x2="9" y2="15"></line>
              <line x1="9" y1="9" x2="15" y2="15"></line>
            </svg>
          `;
        } else if (type === 'warning') {
          iconHtml = `
            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
              <line x1="12" y1="9" x2="12" y2="13"></line>
              <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
          `;
        }
        
        toast.innerHTML = `
          <div class="toast-icon">${iconHtml}</div>
          <div class="toast-content">${message}</div>
        `;
        
        toast.classList.add('show');
        
        if (window.toastTimeout) clearTimeout(window.toastTimeout);
        window.toastTimeout = setTimeout(() => {
          toast.classList.remove('show');
        }, 3500);
      }

      // Extract token from URL search parameter (e.g. ?resetToken=XYZ)
      const params = new URLSearchParams(window.location.search);
      const token = params.get('resetToken');

      if (!token) {
        const errorMsg = 'Invalid request. Password reset token is missing.';
        formMsg.textContent = errorMsg;
        formMsg.className = 'form-msg error';
        showToast(errorMsg, 'error');
        submitBtn.disabled = true;
      }

      const setError = (elementId, message) => {
        document.getElementById(elementId).textContent = message;
      };

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        formMsg.style.display = 'none';
        setError('error-password', '');
        setError('error-confirm-password', '');

        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm-password').value;

        let isValid = true;

        if (!password || password.length < 8) {
          setError('error-password', 'Must be at least 8 characters');
          isValid = false;
        } else if (!/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)/.test(password)) {
          setError('error-password', 'Needs 1 uppercase, 1 lowercase, 1 number');
          isValid = false;
        }

        if (password !== confirmPassword) {
          setError('error-confirm-password', 'Passwords do not match');
          isValid = false;
        }

        if (!isValid) return;

        submitBtn.disabled = true;
        submitBtn.textContent = 'Updating...';

        try {
          const res = await fetch(`${API_URL}/api/auth/reset-password/${token}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password })
          });

          const data = await res.json();

          if (res.ok && data.success) {
            window.location.href = 'login.html?reset=true';
          } else {
            const errorMsg = data.error || 'Reset failed. Token might be expired.';
            formMsg.textContent = errorMsg;
            formMsg.className = 'form-msg error';
            showToast(errorMsg, 'error');
          }
        } catch (err) {
          const errorMsg = 'Server connection error. Please try again.';
          formMsg.textContent = errorMsg;
          formMsg.className = 'form-msg error';
          showToast(errorMsg, 'error');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Reset Password';
        }
      });
    </script>
    <div class="toast" id="toast"></div>
  </body>
</html>
