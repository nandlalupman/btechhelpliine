<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Student Dashboard | BtechHelpline</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="styles.css" />
    <style>
      body.student-body {
        background: var(--soft);
        color: var(--ink);
        font-family: 'Inter', system-ui, sans-serif;
        min-height: 100vh;
      }

      .dashboard-container {
        width: min(100% - 32px, 1200px);
        margin: 0 auto;
        padding: 40px 0;
      }

      header.dash-header {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--line);
        box-shadow: 0 4px 30px rgba(15, 23, 42, 0.03);
        transition: background 0.3s, box-shadow 0.3s;
      }

      .dash-header-container {
        width: min(100% - 32px, 1200px);
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 0;
      }

      .dash-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 1.3rem;
        font-weight: 900;
        color: var(--blue);
      }

      /* Back to top button */
      #back-to-top.visible {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
      }
      #back-to-top:hover {
        transform: translateY(-3px) scale(1.05);
        box-shadow: 0 6px 20px rgba(37, 99, 235, 0.5);
      }
      /* Status update select styling */
      .status-update-select:hover {
        border-color: var(--blue) !important;
      }

      .dash-brand span span {
        color: var(--orange-dark);
      }

      .btn-logout {
        padding: 10px 18px;
        background: rgba(239, 68, 68, 0.05);
        border: 1px solid rgba(239, 68, 68, 0.15);
        color: #dc2626;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.9rem;
        transition: all 0.3s;
      }

      .btn-logout:hover {
        background: rgba(239, 68, 68, 0.1);
        color: #b91c1c;
      }

      .grid-layout {
        display: grid;
        grid-template-columns: 1fr 2fr;
        gap: 30px;
      }

      .card {
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 24px;
        box-shadow: var(--shadow-sm);
      }

      .card h2 {
        font-size: 1.25rem;
        font-weight: 700;
        margin-bottom: 20px;
        color: var(--ink);
        border-left: 4px solid var(--blue);
        padding-left: 10px;
      }

      /* Profile form */
      .profile-form label {
        display: flex;
        flex-direction: column;
        gap: 6px;
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--muted);
        margin-bottom: 16px;
      }

      .profile-form input, .profile-form select {
        width: 100%;
        padding: 10px 14px;
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--ink);
        outline: none;
        transition: all 0.3s;
        font-size: 0.9rem;
      }

      .profile-form input:focus, .profile-form select:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
      }

      .btn-save {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, var(--blue), var(--blue-dark));
        border: none;
        border-radius: 8px;
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        margin-top: 10px;
        box-shadow: var(--shadow-blue);
      }

      .btn-save:hover {
        opacity: 0.95;
        transform: translateY(-1px);
      }

      /* Leads List */
      .leads-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .btn-request {
        padding: 10px 16px;
        background: linear-gradient(135deg, var(--green), var(--green-dark));
        border: none;
        border-radius: 8px;
        color: white;
        font-weight: 600;
        cursor: pointer;
        font-size: 0.88rem;
        transition: all 0.3s;
        box-shadow: 0 4px 12px rgba(16,185,129,0.2);
      }

      .btn-request:hover {
        opacity: 0.95;
        transform: translateY(-1px);
      }

      .lead-item {
        background: var(--soft);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 18px;
        margin-bottom: 15px;
        transition: all 0.3s var(--transition);
      }

      .lead-item:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-sm);
        border-color: #cbd5e1;
      }

      .lead-item-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 12px;
      }

      .lead-item-header h3 {
        font-size: 1.05rem;
        font-weight: 700;
        margin: 0;
        color: var(--ink);
      }

      .status-badge {
        font-size: 0.75rem;
        font-weight: 700;
        padding: 4px 8px;
        border-radius: 6px;
        text-transform: uppercase;
      }

      .status-new { background: #eff6ff; color: var(--blue); }
      .status-contacted { background: #fffbeb; color: var(--orange-dark); }
      .status-in_progress { background: #f5f3ff; color: var(--violet); }
      .status-counselled { background: #ecfdf5; color: var(--green-dark); }
      .status-closed { background: #f1f5f9; color: var(--muted); }
      .status-dropped { background: #fef2f2; color: var(--rose); }

      .lead-details {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 10px;
        font-size: 0.85rem;
        color: var(--muted);
      }

      .lead-details span strong {
        color: var(--ink);
      }

      .no-leads {
        text-align: center;
        padding: 40px 20px;
        color: var(--muted);
      }

      .no-leads p {
        margin-top: 10px;
      }

      /* Lead Modal */
      .modal {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(15, 23, 42, 0.4);
        backdrop-filter: blur(8px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        padding: 20px;
      }

      .modal.open {
        display: flex;
      }

      .modal-card {
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 30px;
        width: 100%;
        max-width: 500px;
        max-height: 90vh;
        overflow-y: auto;
        position: relative;
        box-shadow: var(--shadow-lg);
      }

      .modal-close {
        position: absolute;
        top: 20px; right: 20px;
        background: none;
        border: none;
        color: var(--muted);
        font-size: 1.5rem;
        cursor: pointer;
      }

      .modal-close:hover {
        color: var(--ink);
      }

      .modal-card h2 {
        font-size: 1.3rem;
        font-weight: 800;
        margin-bottom: 20px;
        color: var(--ink);
      }

      .form-msg {
        text-align: center;
        padding: 10px;
        border-radius: 6px;
        font-size: 0.88rem;
        margin-bottom: 15px;
        display: none;
      }

      .form-msg.success { display: block; background: #ecfdf5; color: var(--green-dark); }
      .form-msg.error { display: block; background: #fef2f2; color: var(--rose); }

      /* Toast */
      .toast {
        position: fixed;
        bottom: 24px; right: 24px;
        background: var(--white);
        border: 1px solid var(--line);
        border-left: 4px solid var(--green);
        color: var(--ink);
        padding: 12px 24px;
        border-radius: 8px;
        box-shadow: var(--shadow);
        z-index: 1100;
        display: none;
      }

      /* College Explorer styles */
      .college-card {
        background: var(--white);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
        box-shadow: var(--shadow-sm);
      }

      .college-card:hover {
        transform: translateY(-4px);
        background: var(--white);
        border-color: var(--blue);
        box-shadow: var(--shadow);
      }

      .college-badge {
        padding: 3px 8px;
        border-radius: 6px;
        font-size: 0.72rem;
        font-weight: 700;
        text-transform: uppercase;
        display: inline-block;
      }

      .badge-iit { background: #fef2f2; color: #dc2626; }
      .badge-nit { background: #eff6ff; color: #2563eb; }
      .badge-iiit { background: #f5f3ff; color: #7c3aed; }
      .badge-bits { background: #fffbeb; color: #d97706; }
      .badge-vit { background: #ecfdf5; color: #059669; }
      .badge-state { background: #ecfeff; color: #0891b2; }
      .badge-private { background: #fdf2f8; color: #db2777; }
      .badge-other { background: #f1f5f9; color: #475569; }

      .college-meta-item {
        display: flex;
        justify-content: space-between;
        font-size: 0.8rem;
        color: var(--muted);
        margin-top: 6px;
        border-bottom: 1px dashed var(--line);
        padding-bottom: 6px;
      }

      .college-meta-item:last-child {
        border-bottom: none;
        padding-bottom: 0;
      }

      .college-meta-item strong {
        color: var(--ink);
      }

      .branch-tag {
        display: inline-block;
        background: var(--soft);
        border: 1px solid var(--line);
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 0.78rem;
        color: var(--ink);
        margin: 4px;
        font-weight: 500;
      }

      @media (max-width: 768px) {
        .grid-layout {
          grid-template-columns: 1fr;
        }
      }
    </style>

  </head>

    <script>
      const token = localStorage.getItem('token');
      const role = localStorage.getItem('role');

      if (!token || role !== 'student') {
        localStorage.clear();
        window.location.href = 'login.html';
      }

      // Helper to show toasts
      function showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 3000);
      }

      // Fetch Profile Data
      async function fetchProfile() {
        try {
          const res = await fetch(`${API_URL}/api/user/me`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          const data = await res.json();
          if (res.ok && data.success) {
            const user = data.data;
            document.getElementById('student-name-welcome').textContent = user.name;
            document.getElementById('profile-name').value = user.name;
            document.getElementById('profile-email').value = user.email;
            document.getElementById('profile-phone').value = user.phone;
            document.getElementById('profile-jeeRank').value = user.jeeRank || '';
            document.getElementById('profile-branch').value = user.preferredBranch || '';
            document.getElementById('profile-state').value = user.preferredState || '';
          } else {
            handleLogout();
          }
        } catch (err) {
          console.error(err);
        }
      }

      // Fetch Leads
      async function fetchLeads() {
        try {
          const res = await fetch(`${API_URL}/api/user/my-leads`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          const data = await res.json();
          const listDiv = document.getElementById('leads-list');
          listDiv.innerHTML = '';

          if (res.ok && data.success) {
            const leads = data.data;
            if (leads.length === 0) {
              listDiv.innerHTML = `
                <div class="no-leads">
                  <p>You haven't submitted any consultation requests yet.</p>
                </div>
              `;
              return;
            }

            leads.forEach(lead => {
              const div = document.createElement('div');
              div.className = 'lead-item';
              const createdDate = new Date(lead.createdAt).toLocaleDateString('en-IN', {
                day: 'numeric', month: 'short', year: 'numeric'
              });
              
              div.innerHTML = `
                <div class="lead-item-header">
                  <h3>Counselling Consultation Request</h3>
                  <span class="status-badge status-${lead.status}">${lead.status.replace('_', ' ')}</span>
                </div>
                <div class="lead-details">
                  <span>Branch: <strong>${escapeHTML(lead.preferredBranch)}</strong></span>
                  <span>State: <strong>${escapeHTML(lead.preferredState)}</strong></span>
                  <span>Budget: <strong>${escapeHTML(lead.budget)}</strong></span>
                  <span>Date: <strong>${createdDate}</strong></span>
                </div>
                <div style="margin-top: 16px; border-top: 1px solid var(--line); padding-top: 14px; display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap;">
                  <span style="font-size: 0.8rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">Update Request Status:</span>
                  <select class="status-update-select" onchange="updateLeadStatus('${lead._id}', this.value)" style="padding: 6px 12px; border: 1px solid var(--line); border-radius: 8px; font-size: 0.82rem; background: var(--white); color: var(--ink); font-weight: 600; cursor: pointer; outline: none; transition: all 0.3s;">
                    <option value="new" ${lead.status === 'new' ? 'selected' : ''} ${lead.status !== 'new' ? 'disabled' : ''}>New / Request Sent</option>
                    <option value="contacted" ${lead.status === 'contacted' ? 'selected' : ''} ${lead.status !== 'contacted' ? 'disabled' : ''}>Contacted</option>
                    <option value="in_progress" ${lead.status === 'in_progress' ? 'selected' : ''}>Ongoing</option>
                    <option value="counselled" ${lead.status === 'counselled' ? 'selected' : ''}>Successful / Completed</option>
                    <option value="dropped" ${lead.status === 'dropped' ? 'selected' : ''}>Failed / Dropped</option>
                    <option value="closed" ${lead.status === 'closed' ? 'selected' : ''}>Cancelled</option>
                  </select>
                </div>
              `;
              listDiv.appendChild(div);
            });
          }
        } catch (err) {
          console.error(err);
        }
      }

      function escapeHTML(str) {
        if (!str) return '';
        return str
          .toString()
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      // Save Profile info
      document.getElementById('profile-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msg = document.getElementById('profile-msg');
        msg.style.display = 'none';

        const name = document.getElementById('profile-name').value.trim();
        const phone = document.getElementById('profile-phone').value.trim();
        const jeeRank = document.getElementById('profile-jeeRank').value.trim();
        const branch = document.getElementById('profile-branch').value;
        const state = document.getElementById('profile-state').value;

        try {
          const res = await fetch(`${API_URL}/api/user/me`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ name, phone, jeeRank, preferredBranch: branch, preferredState: state })
          });
          const data = await res.json();
          if (res.ok && data.success) {
            msg.textContent = 'Profile updated successfully!';
            msg.className = 'form-msg success';
            document.getElementById('student-name-welcome').textContent = name;
            localStorage.setItem('userName', name);
          } else {
            msg.textContent = data.error || 'Update failed';
            msg.className = 'form-msg error';
          }
        } catch (err) {
          msg.textContent = 'Server connection error';
          msg.className = 'form-msg error';
        }
      });

      // Submit new lead request
      document.getElementById('request-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msg = document.getElementById('modal-msg');
        msg.style.display = 'none';

        const branch = document.getElementById('req-branch').value;
        const state = document.getElementById('req-state').value;
        const budget = document.getElementById('req-budget').value;
        const category = document.getElementById('req-category').value;
        const message = document.getElementById('req-message').value;

        const name = localStorage.getItem('userName');
        const mobile = document.getElementById('profile-phone').value;
        const email = localStorage.getItem('userEmail');
        const jeeRank = document.getElementById('profile-jeeRank').value;

        try {
          const res = await fetch(`${API_URL}/api/leads`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ name, mobile, email, jeeRank, branch, state, budget, category, message })
          });
          const data = await res.json();
          if (res.ok && data.success) {
            msg.textContent = 'Consultation request submitted!';
            msg.className = 'form-msg success';
            document.getElementById('request-form').reset();
            fetchLeads();
            setTimeout(closeModal, 1500);
          } else {
            msg.textContent = data.error || 'Failed to submit request';
            msg.className = 'form-msg error';
          }
        } catch (err) {
          msg.textContent = 'Server connection error';
          msg.className = 'form-msg error';
        }
      });

      // Modal management
      const modal = document.getElementById('request-modal');
      document.getElementById('btn-open-modal').addEventListener('click', () => {
        document.getElementById('modal-msg').style.display = 'none';
        modal.classList.add('open');
      });
      
      const closeModal = () => { modal.classList.remove('open'); };
      document.getElementById('btn-close-modal').addEventListener('click', closeModal);
      modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
      });

      // Logout
      function handleLogout() {
        localStorage.clear();
        window.location.href = 'login.html';
      }
      document.getElementById('btn-logout').addEventListener('click', handleLogout);

      // Get cover image for college
      function getCollegeImageUrl(col) {
        if (col.imageUrl) return col.imageUrl;
        const nameLower = col.name.toLowerCase();
        if (nameLower.includes('mnit') || nameLower.includes('malaviya national')) {
          return 'assets/colleges/mnit.webp';
        }
        if (nameLower.includes('arya')) {
          return 'assets/colleges/arya.webp';
        }
        if (nameLower.includes('jecrc')) {
          return 'assets/colleges/jecrc.webp';
        }
        if (nameLower.includes('poornima')) {
          return 'assets/colleges/poornima.webp';
        }
        if (nameLower.includes('skit') || nameLower.includes('swami keshvanand')) {
          return 'assets/colleges/skit.webp';
        }
        if (nameLower.includes('vit jaipur') || (nameLower.includes('vivekananda') && nameLower.includes('technology'))) {
          return 'assets/colleges/vit.webp';
        }
        if (col.type === 'IIT') {
          return 'https://images.unsplash.com/photo-1562774053-701939374585?auto=format&fit=crop&w=600&q=80';
        }
        if (col.type === 'NIT') {
          return 'https://images.unsplash.com/photo-1541339907198-e08756dedf3f?auto=format&fit=crop&w=600&q=80';
        }
        if (col.type === 'IIIT') {
          return 'https://images.unsplash.com/photo-1523050854058-8df90110c9f1?auto=format&fit=crop&w=600&q=80';
        }
        return 'https://images.unsplash.com/photo-1498243691581-b145c3f54a91?auto=format&fit=crop&w=600&q=80';
      }

      function getCollegeGradient(type) {
        if (type === 'IIT') return 'linear-gradient(135deg, #7f1d1d, #dc2626)'; // Red gradient
        if (type === 'NIT') return 'linear-gradient(135deg, #1e3a8a, #2563eb)'; // Blue gradient
        if (type === 'IIIT') return 'linear-gradient(135deg, #4c1d95, #7c3aed)'; // Violet gradient
        if (type === 'BITS') return 'linear-gradient(135deg, #78350f, #d97706)'; // Gold gradient
        if (type === 'VIT') return 'linear-gradient(135deg, #064e3b, #10b981)'; // Emerald gradient
        return 'linear-gradient(135deg, #0f172a, #334155)'; // Slate gradient
      }

      window.requestGuidanceForCollege = function(name, state) {
        closeCollegeModal();
        document.getElementById('modal-msg').style.display = 'none';
        const requestModal = document.getElementById('request-modal');
        requestModal.classList.add('open');
        
        // Pre-fill state
        const stateSelect = document.getElementById('req-state');
        if (stateSelect) {
          stateSelect.value = "";
          for (let option of stateSelect.options) {
            if (option.text.toLowerCase() === state.toLowerCase()) {
              stateSelect.value = option.value;
              break;
            }
          }
        }
        
        // Pre-fill message
        const messageBox = document.getElementById('req-message');
        if (messageBox) {
          messageBox.value = `I am interested in getting admission guidance for ${name}.`;
        }
      };

      // Fetch and Filter Colleges
      async function initStatesFilter() {
        try {
          const res = await fetch(`${API_URL}/api/colleges`);
          const data = await res.json();
          if (res.ok && data.success) {
            const states = [...new Set(data.data.map(col => col.state))].sort();
            const stateSelect = document.getElementById('filter-state');
            stateSelect.innerHTML = '<option value="">All States</option>';
            states.forEach(state => {
              const opt = document.createElement('option');
              opt.value = state;
              opt.textContent = state;
              stateSelect.appendChild(opt);
            });
          }
        } catch (err) {
          console.error('Failed to load states for filter:', err);
        }
      }

      let forceShowAllColleges = false;

      window.browseAllColleges = function() {
        forceShowAllColleges = true;
        fetchColleges();
      };

      async function fetchColleges() {
        const searchVal = document.getElementById('college-search').value.trim();
        const typeVal = document.getElementById('filter-type').value;
        const stateVal = document.getElementById('filter-state').value;
        const grid = document.getElementById('colleges-grid');
        
        if (!searchVal && !typeVal && !stateVal && !forceShowAllColleges) {
          grid.innerHTML = `
            <div style="grid-column: 1/-1; text-align: center; padding: 40px 20px; background: var(--soft); border: 1px dashed var(--line); border-radius: 16px; margin: 10px 0; animation: fadeIn 0.3s ease;">
              <span style="font-size: 2.5rem; display: block; margin-bottom: 12px;" aria-hidden="true">🏫</span>
              <h3 style="margin: 0 0 8px 0; font-size: 1.15rem; font-weight: 700; color: var(--ink);">Search the College Directory</h3>
              <p style="margin: 0 0 20px 0; color: var(--muted); font-size: 0.88rem; max-width: 400px; margin-inline: auto;">
                Start typing in the search bar or select filters (by type or state) to explore our directory of 200+ top engineering colleges.
              </p>
              <button onclick="browseAllColleges()" style="padding: 10px 20px; background: linear-gradient(135deg, var(--blue), var(--blue-dark)); color: white; border: none; border-radius: 8px; font-weight: 600; font-size: 0.88rem; cursor: pointer; transition: all 0.3s; box-shadow: var(--shadow-blue);">
                Browse All 200+ Colleges
              </button>
            </div>
          `;
          return;
        }
        
        const params = new URLSearchParams();
        if (searchVal) params.append('search', searchVal);
        if (typeVal) params.append('type', typeVal);
        if (stateVal) params.append('state', stateVal);
        
        try {
          const res = await fetch(`${API_URL}/api/colleges?${params.toString()}`);
          const data = await res.json();
          grid.innerHTML = '';
          
          if (res.ok && data.success) {
            const colleges = data.data;
            if (colleges.length === 0) {
              grid.innerHTML = `
                <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #64748b;">
                  No matching colleges found. Try adjusting your search or filters.
                </div>
              `;
              return;
            }
            
            colleges.forEach(col => {
              const card = document.createElement('div');
              card.className = 'college-card';
              card.setAttribute('onclick', `openCollegeDetails('${col._id}')`);
              
              const rankText = col.nirfRank ? `NIRF Rank: #${col.nirfRank}` : 'NIRF Rank: N/A';
              const feesText = col.feesPerYear ? `₹${(col.feesPerYear / 100000).toFixed(2)} L/yr` : 'N/A';
              const badgeClass = `badge-${col.type.toLowerCase()}`;
              
              const imageUrl = getCollegeImageUrl(col);
              const initials = col.name ? col.name.split(' ').map(w => w[0]).join('').substring(0, 3).toUpperCase() : '';
              const imgHtml = `
                <div style="width: 100%; height: 120px; border-radius: 10px; overflow: hidden; margin-bottom: 12px; background: ${getCollegeGradient(col.type)}; position: relative; display: flex; align-items: center; justify-content: center; color: white;">
                  <span style="font-size: 1.5rem; font-weight: 900; opacity: 0.25; letter-spacing: 0.05em; position: absolute; pointer-events: none;">${initials}</span>
                  <img src="${imageUrl}" alt="${escapeHTML(col.name)}" style="width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0;" onerror="this.style.display='none';" />
                </div>
              `;

              card.innerHTML = `
                ${imgHtml}
                <div>
                  <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 8px;">
                    <span class="college-badge ${badgeClass}">${col.type}</span>
                    <span style="font-size: 0.78rem; font-weight: 600; color: var(--blue);">${rankText}</span>
                  </div>
                  <h3 style="margin: 0 0 6px 0; font-size: 1.15rem; font-weight: 800; color: var(--ink);">${escapeHTML(col.name)}</h3>
                  <div style="font-size: 0.82rem; color: var(--muted); margin-bottom: 12px;">
                    <span>📍 ${escapeHTML(col.city)}, ${escapeHTML(col.state)}</span>
                  </div>
                  <p style="font-size: 0.78rem; color: var(--muted); line-height: 1.5; margin: 0 0 14px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">
                    ${escapeHTML(col.description)}
                  </p>
                </div>
                
                <div style="background: var(--soft); padding: 10px 14px; border-radius: 8px; border: 1px solid var(--line); margin-top: auto;">
                  <div class="college-meta-item">
                    <span>Admission Mode:</span>
                    <strong>${escapeHTML(col.admissionMode)}</strong>
                  </div>
                  <div class="college-meta-item">
                    <span>Avg Package:</span>
                    <strong style="color: #34d399;">₹${col.avgPlacement.toFixed(1)} LPA</strong>
                  </div>
                  <div class="college-meta-item">
                    <span>Fees:</span>
                    <strong>${feesText}</strong>
                  </div>
                </div>
              `;
              grid.appendChild(card);
            });
          }
        } catch (err) {
          console.error(err);
        }
      }

      // Open College Details Modal
      const collegeModal = document.getElementById('college-modal');
      const collegeModalContent = document.getElementById('college-modal-content');
      
      async function openCollegeDetails(collegeId) {
        collegeModalContent.innerHTML = '<div style="text-align:center; padding:40px; color:#64748b;">Loading college details...</div>';
        collegeModal.classList.add('open');
        
        try {
          const res = await fetch(`${API_URL}/api/colleges/${collegeId}`);
          const data = await res.json();
          
          if (res.ok && data.success) {
            const col = data.data;
            
            const rankBadge = col.nirfRank ? `<span style="background: #eff6ff; color: var(--blue); padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: 700;">NIRF Rank: #${col.nirfRank}</span>` : '';
            const typeClass = `badge-${col.type.toLowerCase()}`;
            const feesText = col.feesPerYear ? `₹${col.feesPerYear.toLocaleString('en-IN')} / Year` : 'N/A';
            const highestPackage = col.highestPlacement >= 100 ? `₹${(col.highestPlacement / 100).toFixed(2)} Cr` : `₹${col.highestPlacement.toFixed(1)} LPA`;
            
            let branchesHTML = '';
            if (col.branches && col.branches.length > 0) {
              branchesHTML = col.branches.map(b => `<span class="branch-tag">${escapeHTML(b)}</span>`).join('');
            }
            
            const initials = col.name ? col.name.split(' ').map(w => w[0]).join('').substring(0, 3).toUpperCase() : '';
            const modalImgHtml = `
              <div style="width: 100%; height: 220px; border-radius: 12px; overflow: hidden; margin-bottom: 20px; background: ${getCollegeGradient(col.type)}; position: relative; display: flex; align-items: center; justify-content: center; color: white;">
                <span style="font-size: 3rem; font-weight: 900; opacity: 0.25; letter-spacing: 0.05em; position: absolute; pointer-events: none;">${initials}</span>
                <img src="${getCollegeImageUrl(col)}" alt="${escapeHTML(col.name)}" style="width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0;" onerror="this.style.display='none';" />
              </div>
            `;

            collegeModalContent.innerHTML = `
              ${modalImgHtml}

              <div style="display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap;">
                <span class="college-badge ${typeClass}" style="font-size: 0.85rem; padding: 4px 10px;">${col.type}</span>
                ${rankBadge}
                <span style="color: var(--muted); font-size: 0.9rem;">📍 ${escapeHTML(col.city)}, ${escapeHTML(col.state)}</span>
              </div>
              
              <h2 style="color: var(--ink); font-size: 1.85rem; font-weight: 900; margin: 0 0 16px 0; line-height: 1.25;">${escapeHTML(col.name)}</h2>
              
              <p style="color: #334155; font-size: 0.95rem; line-height: 1.6; margin: 0 0 24px 0;">${escapeHTML(col.description)}</p>
              
              <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; margin-bottom: 24px;">
                <div style="background: var(--soft); border: 1px solid var(--line); padding: 14px 18px; border-radius: 12px;">
                  <span style="display:block; font-size: 0.8rem; color: var(--muted); text-transform: uppercase; margin-bottom: 4px;">Placement Stats</span>
                  <div style="display:flex; justify-content:space-between; margin-bottom: 6px;">
                    <span style="font-size:0.9rem; color: var(--muted);">Average Package:</span>
                    <strong style="color: var(--green-dark); font-size:0.95rem;">₹${col.avgPlacement.toFixed(1)} LPA</strong>
                  </div>
                  <div style="display:flex; justify-content:space-between;">
                    <span style="font-size:0.9rem; color: var(--muted);">Highest Package:</span>
                    <strong style="color: var(--green-dark); font-size:0.95rem;">${highestPackage}</strong>
                  </div>
                </div>
                
                <div style="background: var(--soft); border: 1px solid var(--line); padding: 14px 18px; border-radius: 12px;">
                  <span style="display:block; font-size: 0.8rem; color: var(--muted); text-transform: uppercase; margin-bottom: 4px;">Admission Details</span>
                  <div style="display:flex; justify-content:space-between; margin-bottom: 6px;">
                    <span style="font-size:0.9rem; color: var(--muted);">Admission Mode:</span>
                    <strong style="color: var(--ink); font-size:0.95rem;">${escapeHTML(col.admissionMode)}</strong>
                  </div>
                  <div style="display:flex; justify-content:space-between; margin-bottom: 6px;">
                    <span style="font-size:0.9rem; color: var(--muted);">CSE Cutoff Rank:</span>
                    <strong style="color: var(--blue); font-size:0.95rem;">${escapeHTML(col.cutoffRankCSE)}</strong>
                  </div>
                  <div style="display:flex; justify-content:space-between;">
                    <span style="font-size:0.9rem; color: var(--muted);">Yearly Fees:</span>
                    <strong style="color: var(--ink); font-size:0.95rem;">${feesText}</strong>
                  </div>
                </div>
              </div>
              
              <div style="margin-bottom: 24px;">
                <h4 style="color: var(--ink); margin: 0 0 10px 0; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 800;">Available Engineering Branches</h4>
                <div style="margin-left:-4px; margin-right:-4px;">
                  ${branchesHTML}
                </div>
              </div>
              
              <div style="display: flex; gap: 12px; justify-content: flex-end; border-top: 1px solid var(--line); padding-top: 20px; margin-top: 20px; flex-wrap: wrap;">
                ${col.website ? `
                  <a href="${escapeHTML(col.website)}" target="_blank" style="text-decoration:none; display:inline-flex; align-items:center; background: #eff6ff; border: 1px solid rgba(37,99,235,0.2); color: var(--blue); padding:10px 18px; border-radius:10px; font-weight:600; font-size:0.9rem; transition:all 0.3s; gap:6px;">
                    Visit Website ↗
                  </a>
                ` : ''}
                <button onclick="requestGuidanceForCollege('${escapeHTML(col.name)}', '${escapeHTML(col.state)}')" class="btn-request" style="display:inline-flex; align-items:center; background: linear-gradient(135deg, var(--green), var(--green-dark)); color:white; border:none; padding:10px 18px; border-radius:10px; font-weight:600; font-size:0.9rem; cursor:pointer; gap:6px; box-shadow:0 4px 12px rgba(16,185,129,0.15);">
                  Apply / Request Guidance 🎓
                </button>
              </div>
            `;
          } else {
            collegeModalContent.innerHTML = `<div style="text-align:center; padding:40px; color:#f87171;">${data.error || 'Failed to load details'}</div>`;
          }
        } catch (err) {
          collegeModalContent.innerHTML = '<div style="text-align:center; padding:40px; color:#f87171;">Server connection error</div>';
        }
      }
      
      const closeCollegeModal = () => { collegeModal.classList.remove('open'); };
      document.getElementById('btn-close-college-modal').addEventListener('click', closeCollegeModal);
      collegeModal.addEventListener('click', (e) => {
        if (e.target === collegeModal) closeCollegeModal();
      });

      // Event listeners for filters
      document.getElementById('college-search').addEventListener('input', () => {
        forceShowAllColleges = false;
        fetchColleges();
      });
      document.getElementById('filter-type').addEventListener('change', () => {
        forceShowAllColleges = false;
        fetchColleges();
      });
      document.getElementById('filter-state').addEventListener('change', () => {
        forceShowAllColleges = false;
        fetchColleges();
      });

      // Init
      fetchProfile();
      fetchLeads();
      initStatesFilter().finally(() => {
        fetchColleges();
      });

      // Scroll handling for sticky header progress and back-to-top
      window.addEventListener('scroll', () => {
        const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
        const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        const scrolled = height > 0 ? (winScroll / height) * 100 : 0;
        const scrollBar = document.getElementById('scroll-progress');
        if (scrollBar) scrollBar.style.width = scrolled + '%';
        
        const backToTop = document.getElementById('back-to-top');
        if (backToTop) {
          if (winScroll > 300) {
            backToTop.classList.add('visible');
          } else {
            backToTop.classList.remove('visible');
          }
        }
      });

      const backToTopBtn = document.getElementById('back-to-top');
      if (backToTopBtn) {
        backToTopBtn.addEventListener('click', () => {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      }

      // Globally register updateLeadStatus
      window.updateLeadStatus = async function(leadId, newStatus) {
        try {
          const res = await fetch(`${API_URL}/api/user/my-leads/${leadId}/status`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ status: newStatus })
          });
          const data = await res.json();
          if (res.ok && data.success) {
            showToast('Request status updated successfully!');
            fetchLeads();
          } else {
            showToast(data.error || 'Failed to update status');
            fetchLeads();
          }
        } catch (err) {
          console.error(err);
          showToast('Server connection error');
          fetchLeads();
        }
      };
