<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Student Dashboard | BtechHelpline</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="styles.css" />
    <style>
      body.student-body {
        background: #0f172a;
        color: #f8fafc;
        font-family: 'Inter', system-ui, sans-serif;
        min-height: 100vh;
      }

      .dashboard-container {
        width: min(100% - 32px, 1200px);
        margin: 0 auto;
        padding: 40px 0;
      }

      header.dash-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 40px;
        padding-bottom: 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .dash-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 1.3rem;
        font-weight: 900;
        color: #3b82f6;
      }

      .dash-brand span span {
        color: #f59e0b;
      }

      .btn-logout {
        padding: 10px 18px;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.2);
        color: #f87171;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.9rem;
        transition: all 0.3s;
      }

      .btn-logout:hover {
        background: rgba(239, 68, 68, 0.2);
        color: #ef4444;
      }

      .grid-layout {
        display: grid;
        grid-template-columns: 1fr 2fr;
        gap: 30px;
      }

      .card {
        background: rgba(30, 41, 59, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        padding: 24px;
      }

      .card h2 {
        font-size: 1.25rem;
        font-weight: 700;
        margin-bottom: 20px;
        color: #ffffff;
        border-left: 4px solid #3b82f6;
        padding-left: 10px;
      }

      /* Profile form */
      .profile-form label {
        display: flex;
        flex-direction: column;
        gap: 6px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #cbd5e1;
        margin-bottom: 16px;
      }

      .profile-form input, .profile-form select {
        width: 100%;
        padding: 10px 14px;
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        color: #ffffff;
        outline: none;
        transition: border-color 0.3s;
        font-size: 0.9rem;
      }

      .profile-form input:focus, .profile-form select:focus {
        border-color: #3b82f6;
      }

      .btn-save {
        width: 100%;
        padding: 12px;
        background: #2563eb;
        border: none;
        border-radius: 8px;
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
        margin-top: 10px;
      }

      .btn-save:hover {
        opacity: 0.9;
      }

      /* Leads List */
      .leads-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .btn-request {
        padding: 10px 16px;
        background: linear-gradient(135deg, #10b981, #059669);
        border: none;
        border-radius: 8px;
        color: white;
        font-weight: 600;
        cursor: pointer;
        font-size: 0.88rem;
        transition: opacity 0.2;
      }

      .btn-request:hover {
        opacity: 0.9;
      }

      .lead-item {
        background: rgba(15, 23, 42, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        padding: 18px;
        margin-bottom: 15px;
        transition: transform 0.2s;
      }

      .lead-item:hover {
        transform: translateY(-2px);
      }

      .lead-item-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 12px;
      }

      .lead-item-header h3 {
        font-size: 1.05rem;
        font-weight: 700;
        margin: 0;
        color: #ffffff;
      }

      .status-badge {
        font-size: 0.75rem;
        font-weight: 700;
        padding: 4px 8px;
        border-radius: 6px;
        text-transform: uppercase;
      }

      .status-new { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
      .status-contacted { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
      .status-in_progress { background: rgba(139, 92, 246, 0.15); color: #a78bfa; }
      .status-counselled { background: rgba(16, 185, 129, 0.15); color: #34d399; }
      .status-closed { background: rgba(100, 116, 139, 0.15); color: #cbd5e1; }
      .status-dropped { background: rgba(239, 68, 68, 0.15); color: #f87171; }

      .lead-details {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 10px;
        font-size: 0.85rem;
        color: #94a3b8;
      }

      .lead-details span strong {
        color: #cbd5e1;
      }

      .no-leads {
        text-align: center;
        padding: 40px 20px;
        color: #64748b;
      }

      .no-leads p {
        margin-top: 10px;
      }

      /* Lead Modal */
      .modal {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(8px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        padding: 20px;
      }

      .modal.open {
        display: flex;
      }

      .modal-card {
        background: #1e293b;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 30px;
        width: 100%;
        max-width: 500px;
        position: relative;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      }

      .modal-close {
        position: absolute;
        top: 20px; right: 20px;
        background: none;
        border: none;
        color: #94a3b8;
        font-size: 1.5rem;
        cursor: pointer;
      }

      .modal-close:hover {
        color: #ffffff;
      }

      .modal-card h2 {
        font-size: 1.3rem;
        font-weight: 800;
        margin-bottom: 20px;
        color: #ffffff;
      }

      .form-msg {
        text-align: center;
        padding: 10px;
        border-radius: 6px;
        font-size: 0.88rem;
        margin-bottom: 15px;
        display: none;
      }

      .form-msg.success { display: block; background: rgba(16, 185, 129, 0.15); color: #34d399; }
      .form-msg.error { display: block; background: rgba(239, 68, 68, 0.15); color: #f87171; }

      /* Toast */
      .toast {
        position: fixed;
        bottom: 24px; right: 24px;
        background: #1e293b;
        border-left: 4px solid #10b981;
        color: white;
        padding: 12px 24px;
        border-radius: 8px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        z-index: 1100;
        display: none;
      }

      /* College Explorer styles */
      .college-card {
        background: rgba(15, 23, 42, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 16px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
      }

      .college-card:hover {
        transform: translateY(-4px);
        background: rgba(15, 23, 42, 0.6);
        border-color: rgba(59, 130, 246, 0.3);
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
      }

      .college-badge {
        padding: 3px 8px;
        border-radius: 6px;
        font-size: 0.72rem;
        font-weight: 700;
        text-transform: uppercase;
        display: inline-block;
      }

      .badge-iit { background: rgba(239, 68, 68, 0.15); color: #f87171; }
      .badge-nit { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
      .badge-iiit { background: rgba(139, 92, 246, 0.15); color: #a78bfa; }
      .badge-bits { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
      .badge-vit { background: rgba(16, 185, 129, 0.15); color: #34d399; }
      .badge-state { background: rgba(6, 182, 212, 0.15); color: #22d3ee; }
      .badge-private { background: rgba(236, 72, 153, 0.15); color: #f472b6; }
      .badge-other { background: rgba(100, 116, 139, 0.15); color: #cbd5e1; }

      .college-meta-item {
        display: flex;
        justify-content: space-between;
        font-size: 0.8rem;
        color: #94a3b8;
        margin-top: 6px;
        border-bottom: 1px dashed rgba(255,255,255,0.05);
        padding-bottom: 6px;
      }

      .college-meta-item:last-child {
        border-bottom: none;
        padding-bottom: 0;
      }

      .college-meta-item strong {
        color: #cbd5e1;
      }

      .branch-tag {
        display: inline-block;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 0.78rem;
        color: #cbd5e1;
        margin: 4px;
      }

      @media (max-width: 768px) {
        .grid-layout {
          grid-template-columns: 1fr;
        }
      }
    </style>

    <script>
      const token = localStorage.getItem('token');
      const role = localStorage.getItem('role');

      if (!token || role !== 'student') {
        localStorage.clear();
        window.location.href = 'login.html';
      }

      // Helper to show toasts
      function showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 3000);
      }

      // Fetch Profile Data
      async function fetchProfile() {
        try {
          const res = await fetch(`${API_URL}/api/user/me`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          const data = await res.json();
          if (res.ok && data.success) {
            const user = data.data;
            document.getElementById('student-name-welcome').textContent = user.name;
            document.getElementById('profile-name').value = user.name;
            document.getElementById('profile-email').value = user.email;
            document.getElementById('profile-phone').value = user.phone;
            document.getElementById('profile-jeeRank').value = user.jeeRank || '';
            document.getElementById('profile-branch').value = user.preferredBranch || '';
            document.getElementById('profile-state').value = user.preferredState || '';
          } else {
            handleLogout();
          }
        } catch (err) {
          console.error(err);
        }
      }

      // Fetch Leads
      async function fetchLeads() {
        try {
          const res = await fetch(`${API_URL}/api/user/my-leads`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          const data = await res.json();
          const listDiv = document.getElementById('leads-list');
          listDiv.innerHTML = '';

          if (res.ok && data.success) {
            const leads = data.data;
            if (leads.length === 0) {
              listDiv.innerHTML = `
                <div class="no-leads">
                  <p>You haven't submitted any consultation requests yet.</p>
                </div>
              `;
              return;
            }

            leads.forEach(lead => {
              const div = document.createElement('div');
              div.className = 'lead-item';
              const createdDate = new Date(lead.createdAt).toLocaleDateString('en-IN', {
                day: 'numeric', month: 'short', year: 'numeric'
              });
              
              div.innerHTML = `
                <div class="lead-item-header">
                  <h3>Counselling Consultation Request</h3>
                  <span class="status-badge status-${lead.status}">${lead.status.replace('_', ' ')}</span>
                </div>
                <div class="lead-details">
                  <span>Branch: <strong>${escapeHTML(lead.preferredBranch)}</strong></span>
                  <span>State: <strong>${escapeHTML(lead.preferredState)}</strong></span>
                  <span>Budget: <strong>${escapeHTML(lead.budget)}</strong></span>
                  <span>Date: <strong>${createdDate}</strong></span>
                </div>
              `;
              listDiv.appendChild(div);
            });
          }
        } catch (err) {
          console.error(err);
        }
      }

      function escapeHTML(str) {
        if (!str) return '';
        return str
          .toString()
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      // Save Profile info
      document.getElementById('profile-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msg = document.getElementById('profile-msg');
        msg.style.display = 'none';

        const name = document.getElementById('profile-name').value.trim();
        const phone = document.getElementById('profile-phone').value.trim();
        const jeeRank = document.getElementById('profile-jeeRank').value.trim();
        const branch = document.getElementById('profile-branch').value;
        const state = document.getElementById('profile-state').value;

        try {
          const res = await fetch(`${API_URL}/api/user/me`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ name, phone, jeeRank, preferredBranch: branch, preferredState: state })
          });
          const data = await res.json();
          if (res.ok && data.success) {
            msg.textContent = 'Profile updated successfully!';
            msg.className = 'form-msg success';
            document.getElementById('student-name-welcome').textContent = name;
            localStorage.setItem('userName', name);
          } else {
            msg.textContent = data.error || 'Update failed';
            msg.className = 'form-msg error';
          }
        } catch (err) {
          msg.textContent = 'Server connection error';
          msg.className = 'form-msg error';
        }
      });

      // Submit new lead request
      document.getElementById('request-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msg = document.getElementById('modal-msg');
        msg.style.display = 'none';

        const branch = document.getElementById('req-branch').value;
        const state = document.getElementById('req-state').value;
        const budget = document.getElementById('req-budget').value;
        const category = document.getElementById('req-category').value;
        const message = document.getElementById('req-message').value;

        const name = localStorage.getItem('userName');
        const mobile = document.getElementById('profile-phone').value;
        const email = localStorage.getItem('userEmail');
        const jeeRank = document.getElementById('profile-jeeRank').value;

        try {
          const res = await fetch(`${API_URL}/api/leads`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ name, mobile, email, jeeRank, branch, state, budget, category, message })
          });
          const data = await res.json();
          if (res.ok && data.success) {
            msg.textContent = 'Consultation request submitted!';
            msg.className = 'form-msg success';
            document.getElementById('request-form').reset();
            fetchLeads();
            setTimeout(closeModal, 1500);
          } else {
            msg.textContent = data.error || 'Failed to submit request';
            msg.className = 'form-msg error';
          }
        } catch (err) {
          msg.textContent = 'Server connection error';
          msg.className = 'form-msg error';
        }
      });

      // Modal management
      const modal = document.getElementById('request-modal');
      document.getElementById('btn-open-modal').addEventListener('click', () => {
        document.getElementById('modal-msg').style.display = 'none';
        modal.classList.add('open');
      });
      
      const closeModal = () => { modal.classList.remove('open'); };
      document.getElementById('btn-close-modal').addEventListener('click', closeModal);

      // Logout
      function handleLogout() {
        localStorage.clear();
        window.location.href = 'login.html';
      }
      document.getElementById('btn-logout').addEventListener('click', handleLogout);

      // Fetch and Filter Colleges
      async function initStatesFilter() {
        try {
          const res = await fetch(`${API_URL}/api/colleges`);
          const data = await res.json();
          if (res.ok && data.success) {
            const states = [...new Set(data.data.map(col => col.state))].sort();
            const stateSelect = document.getElementById('filter-state');
            stateSelect.innerHTML = '<option value="">All States</option>';
            states.forEach(state => {
              const opt = document.createElement('option');
              opt.value = state;
              opt.textContent = state;
              stateSelect.appendChild(opt);
            });
          }
        } catch (err) {
          console.error('Failed to load states for filter:', err);
        }
      }

      async function fetchColleges() {
        const searchVal = document.getElementById('college-search').value;
        const typeVal = document.getElementById('filter-type').value;
        const stateVal = document.getElementById('filter-state').value;
        
        const params = new URLSearchParams();
        if (searchVal) params.append('search', searchVal);
        if (typeVal) params.append('type', typeVal);
        if (stateVal) params.append('state', stateVal);
        
        try {
          const res = await fetch(`${API_URL}/api/colleges?${params.toString()}`);
          const data = await res.json();
          const grid = document.getElementById('colleges-grid');
          grid.innerHTML = '';
          
          if (res.ok && data.success) {
            const colleges = data.data;
            if (colleges.length === 0) {
              grid.innerHTML = `
                <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #64748b;">
                  No matching colleges found. Try adjusting your search or filters.
                </div>
              `;
              return;
            }
            
            colleges.forEach(col => {
              const card = document.createElement('div');
              card.className = 'college-card';
              card.setAttribute('onclick', `openCollegeDetails('${col._id}')`);
              
              const rankText = col.nirfRank ? `NIRF Rank: #${col.nirfRank}` : 'NIRF Rank: N/A';
              const feesText = col.feesPerYear ? `₹${(col.feesPerYear / 100000).toFixed(2)} L/yr` : 'N/A';
              const badgeClass = `badge-${col.type.toLowerCase()}`;
              
              card.innerHTML = `
                <div>
                  <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; gap: 8px;">
                    <span class="college-badge ${badgeClass}">${col.type}</span>
                    <span style="font-size: 0.78rem; font-weight: 600; color: #3b82f6;">${rankText}</span>
                  </div>
                  <h3 style="margin: 0 0 6px 0; font-size: 1.15rem; font-weight: 800; color: white;">${escapeHTML(col.name)}</h3>
                  <div style="font-size: 0.82rem; color: #94a3b8; margin-bottom: 16px;">
                    <span>📍 ${escapeHTML(col.city)}, ${escapeHTML(col.state)}</span>
                  </div>
                </div>
                
                <div style="background: rgba(15, 23, 42, 0.4); padding: 10px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.03);">
                  <div class="college-meta-item">
                    <span>Admission Mode:</span>
                    <strong>${escapeHTML(col.admissionMode)}</strong>
                  </div>
                  <div class="college-meta-item">
                    <span>Avg Package:</span>
                    <strong style="color: #34d399;">₹${col.avgPlacement.toFixed(1)} LPA</strong>
                  </div>
                  <div class="college-meta-item">
                    <span>Fees:</span>
                    <strong>${feesText}</strong>
                  </div>
                </div>
              `;
              grid.appendChild(card);
            });
          }
        } catch (err) {
          console.error(err);
        }
      }

      // Open College Details Modal
      const collegeModal = document.getElementById('college-modal');
      const collegeModalContent = document.getElementById('college-modal-content');
      
      async function openCollegeDetails(collegeId) {
        collegeModalContent.innerHTML = '<div style="text-align:center; padding:40px; color:#64748b;">Loading college details...</div>';
        collegeModal.classList.add('open');
        
        try {
          const res = await fetch(`${API_URL}/api/colleges/${collegeId}`);
          const data = await res.json();
          
          if (res.ok && data.success) {
            const col = data.data;
            
            const rankBadge = col.nirfRank ? `<span style="background: rgba(59,130,246,0.15); color:#60a5fa; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: 700;">NIRF Rank: #${col.nirfRank}</span>` : '';
            const typeClass = `badge-${col.type.toLowerCase()}`;
            const feesText = col.feesPerYear ? `₹${col.feesPerYear.toLocaleString('en-IN')} / Year` : 'N/A';
            const highestPackage = col.highestPlacement >= 100 ? `₹${(col.highestPlacement / 100).toFixed(2)} Cr` : `₹${col.highestPlacement.toFixed(1)} LPA`;
            
            let branchesHTML = '';
            if (col.branches && col.branches.length > 0) {
              branchesHTML = col.branches.map(b => `<span class="branch-tag">${escapeHTML(b)}</span>`).join('');
            }
            
            collegeModalContent.innerHTML = `
              <div style="display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap;">
                <span class="college-badge ${typeClass}" style="font-size: 0.85rem; padding: 4px 10px;">${col.type}</span>
                ${rankBadge}
                <span style="color: #94a3b8; font-size: 0.9rem;">📍 ${escapeHTML(col.city)}, ${escapeHTML(col.state)}</span>
              </div>
              
              <h2 style="color: white; font-size: 1.85rem; font-weight: 900; margin: 0 0 16px 0; line-height: 1.25;">${escapeHTML(col.name)}</h2>
              
              <p style="color: #cbd5e1; font-size: 0.95rem; line-height: 1.6; margin: 0 0 24px 0;">${escapeHTML(col.description)}</p>
              
              <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; margin-bottom: 24px;">
                <div style="background: rgba(15,23,42,0.4); border: 1px solid rgba(255,255,255,0.05); padding: 14px 18px; border-radius: 12px;">
                  <span style="display:block; font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px;">Placement Stats</span>
                  <div style="display:flex; justify-content:space-between; margin-bottom: 6px;">
                    <span style="font-size:0.9rem; color:#cbd5e1;">Average Package:</span>
                    <strong style="color: #34d399; font-size:0.95rem;">₹${col.avgPlacement.toFixed(1)} LPA</strong>
                  </div>
                  <div style="display:flex; justify-content:space-between;">
                    <span style="font-size:0.9rem; color:#cbd5e1;">Highest Package:</span>
                    <strong style="color: #10b981; font-size:0.95rem;">${highestPackage}</strong>
                  </div>
                </div>
                
                <div style="background: rgba(15,23,42,0.4); border: 1px solid rgba(255,255,255,0.05); padding: 14px 18px; border-radius: 12px;">
                  <span style="display:block; font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px;">Admission Details</span>
                  <div style="display:flex; justify-content:space-between; margin-bottom: 6px;">
                    <span style="font-size:0.9rem; color:#cbd5e1;">Admission Mode:</span>
                    <strong style="color:#ffffff; font-size:0.95rem;">${escapeHTML(col.admissionMode)}</strong>
                  </div>
                  <div style="display:flex; justify-content:space-between; margin-bottom: 6px;">
                    <span style="font-size:0.9rem; color:#cbd5e1;">CSE Cutoff Rank:</span>
                    <strong style="color:#60a5fa; font-size:0.95rem;">${escapeHTML(col.cutoffRankCSE)}</strong>
                  </div>
                  <div style="display:flex; justify-content:space-between;">
                    <span style="font-size:0.9rem; color:#cbd5e1;">Yearly Fees:</span>
                    <strong style="color:#ffffff; font-size:0.95rem;">${feesText}</strong>
                  </div>
                </div>
              </div>
              
              <div style="margin-bottom: 24px;">
                <h4 style="color: white; margin: 0 0 10px 0; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.05em;">Available Engineering Branches</h4>
                <div style="margin-left:-4px; margin-right:-4px;">
                  ${branchesHTML}
                </div>
              </div>
              
              ${col.website ? `
                <div style="text-align: right; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 20px;">
                  <a href="${escapeHTML(col.website)}" target="_blank" class="btn-request" style="text-decoration:none; display:inline-block; background: linear-gradient(135deg, #3b82f6, #1d4ed8);">Visit Official Website ↗</a>
                </div>
              ` : ''}
            `;
          } else {
            collegeModalContent.innerHTML = `<div style="text-align:center; padding:40px; color:#f87171;">${data.error || 'Failed to load details'}</div>`;
          }
        } catch (err) {
          collegeModalContent.innerHTML = '<div style="text-align:center; padding:40px; color:#f87171;">Server connection error</div>';
        }
      }
      
      const closeCollegeModal = () => { collegeModal.classList.remove('open'); };
      document.getElementById('btn-close-college-modal').addEventListener('click', closeCollegeModal);

      // Event listeners for filters
      document.getElementById('college-search').addEventListener('input', fetchColleges);
      document.getElementById('filter-type').addEventListener('change', fetchColleges);
      document.getElementById('filter-state').addEventListener('change', fetchColleges);

      // Init
      fetchProfile();
      fetchLeads();
      initStatesFilter().finally(() => {
        fetchColleges();
      });

    </script>
  </body>
</html>
